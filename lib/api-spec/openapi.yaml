openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: league
    description: Franchise and league data (per guild)
  - name: economy
    description: Economy and coin data (per guild)
  - name: global
    description: Cross-guild global data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/leagues:
    get:
      operationId: getLeagues
      tags: [global]
      summary: List all known guilds
      description: Returns a summary of every guild that has at least one season in the database
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Guild list
          content:
            application/json:
              schema:
                type: object
                properties:
                  leagues:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeagueSummary"
                required: [leagues]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/records:
    get:
      operationId: getGlobalRecords
      tags: [global]
      summary: Global all-time W/L leaderboard
      description: Returns cross-guild all-time records from global_user_records, sorted by wins
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Global leaderboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      $ref: "#/components/schemas/GlobalUserRecord"
                required: [leaderboard]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/users/{discordId}:
    get:
      operationId: getGlobalUser
      tags: [global]
      summary: Cross-guild profile for a Discord user
      description: Returns global W/L record, savings balance, and per-guild profiles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/discordId"
      responses:
        "200":
          description: Global user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalUserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}:
    get:
      operationId: getLeagueInfo
      tags: [league]
      summary: Active season info
      description: Returns the currently active season for a guild including id, week, season number, and config overrides
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Active season
          content:
            application/json:
              schema:
                type: object
                properties:
                  season:
                    $ref: "#/components/schemas/Season"
                required: [season]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/teams:
    get:
      operationId: getLeagueTeams
      tags: [league]
      summary: All franchise teams
      description: Returns all MCA teams for the active season including human/CPU status and Discord IDs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaTeam"
                required: [seasonId, seasonNumber, teams]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/standings:
    get:
      operationId: getLeagueStandings
      tags: [league]
      summary: Team standings and season stats
      description: Returns wins/losses and offensive/defensive stats from team_season_stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Standings
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  currentWeek:
                    type: string
                  standings:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamStanding"
                required: [seasonId, seasonNumber, currentWeek, standings]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/schedule:
    get:
      operationId: getLeagueSchedule
      tags: [league]
      summary: Full season schedule
      description: Returns all games for the active season. Filter by 0-based week index with ?week=N.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: week
          in: query
          required: false
          description: 0-based week index to filter by
          schema:
            type: integer
      responses:
        "200":
          description: Schedule games
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  currentWeek:
                    type: string
                  games:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScheduleGame"
                required: [seasonId, seasonNumber, currentWeek, games]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/roster/{teamId}:
    get:
      operationId: getTeamRoster
      tags: [league]
      summary: Roster for a specific team
      description: Returns all players on a team with attributes, sorted by overall rating
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: teamId
          in: path
          required: true
          description: MCA team ID
          schema:
            type: integer
      responses:
        "200":
          description: Team roster
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  teamId:
                    type: integer
                  roster:
                    type: array
                    items:
                      $ref: "#/components/schemas/RosterPlayer"
                required: [seasonId, seasonNumber, teamId, roster]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/player-stats:
    get:
      operationId: getPlayerStats
      tags: [league]
      summary: Cumulative player season stats
      description: Returns season stats for all players. Filter by position with ?position=QB.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: position
          in: query
          required: false
          description: Filter by position abbreviation (e.g. QB, WR, RB)
          schema:
            type: string
      responses:
        "200":
          description: Player stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  stats:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlayerSeasonStats"
                required: [seasonId, seasonNumber, stats]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/draft-picks:
    get:
      operationId: getDraftPicks
      tags: [league]
      summary: Draft pick inventory
      description: Returns all draft picks held by each team for the next 3 draft classes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Draft picks
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  picks:
                    type: array
                    items:
                      $ref: "#/components/schemas/DraftPick"
                required: [seasonId, seasonNumber, picks]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/news:
    get:
      operationId: getLeagueNews
      tags: [league]
      summary: League news headlines
      description: Returns the latest EA CFM news items for the active season (most recent 25 by default)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: League news
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  news:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeagueNewsItem"
                required: [seasonId, seasonNumber, news]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/users:
    get:
      operationId: getLeagueUsers
      tags: [economy]
      summary: All users with balances and season records
      description: Returns all registered users for a guild including coin balance, season W/L/T/PD, and playoff seeds
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: League members
          content:
            application/json:
              schema:
                type: object
                properties:
                  guildId:
                    type: string
                  seasonId:
                    type: integer
                    nullable: true
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeagueUserWithRecord"
                required: [guildId, users]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/leagues/{guildId}/users/{discordId}:
    get:
      operationId: getLeagueUser
      tags: [economy]
      summary: Single user full profile
      description: Returns user record, current season W/L, inventory, global record, and savings balance
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - $ref: "#/components/parameters/discordId"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueUserDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/users/{discordId}/transactions:
    get:
      operationId: getUserTransactions
      tags: [economy]
      summary: Last 50 transactions for a user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - $ref: "#/components/parameters/discordId"
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: object
                properties:
                  guildId:
                    type: string
                  discordId:
                    type: string
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/CoinTransaction"
                required: [guildId, discordId, transactions]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/leagues/{guildId}/wagers:
    get:
      operationId: getWagers
      tags: [economy]
      summary: Wagers for a guild
      description: Returns wagers. Filter by status (active/completed/pending/refused/cancelled).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, active, completed, refused, cancelled]
      responses:
        "200":
          description: Wagers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  guildId:
                    type: string
                  wagers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Wager"
                required: [guildId, wagers]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/leagues/{guildId}/store:
    get:
      operationId: getStore
      tags: [economy]
      summary: Current payout config and store prices
      description: Returns all payout config values (win/loss payouts, milestone tiers) and per-season store item cost overrides
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Store and payout config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    guildId:
      name: guildId
      in: path
      required: true
      description: Discord guild (server) ID
      schema:
        type: string
    discordId:
      name: discordId
      in: path
      required: true
      description: Discord user ID
      schema:
        type: string
    limit:
      name: limit
      in: query
      required: false
      description: Maximum number of results to return (max 200)
      schema:
        type: integer
        default: 50
        maximum: 200

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Season:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        seasonNumber:
          type: integer
        isActive:
          type: boolean
        currentWeek:
          type: string
        catchupMode:
          type: boolean
        startedAt:
          type: string
          format: date-time
        coreAttrCostOverride:
          type: integer
          nullable: true
        coreAttrCapOverride:
          type: integer
          nullable: true
        legendCostOverride:
          type: integer
          nullable: true
      required: [id, guildId, seasonNumber, isActive, currentWeek, catchupMode, startedAt]

    McaTeam:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        teamId:
          type: integer
        fullName:
          type: string
        nickName:
          type: string
        conference:
          type: string
          nullable: true
        userName:
          type: string
        isHuman:
          type: boolean
        discordId:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
      required: [id, seasonId, teamId, fullName, nickName, userName, isHuman]

    TeamStanding:
      type: object
      properties:
        teamId:
          type: integer
        teamName:
          type: string
        discordId:
          type: string
          nullable: true
        wins:
          type: integer
        losses:
          type: integer
        offYds:
          type: integer
        offPassYds:
          type: integer
        offRushYds:
          type: integer
        offTDs:
          type: integer
        offPtsPerGame:
          type: number
        defPassYds:
          type: integer
        defRushYds:
          type: integer
        defTDs:
          type: integer
        teamSacks:
          type: integer
        teamInts:
          type: integer
        offRedZonePct:
          type: number
        defRedZonePct:
          type: number
        turnoverDiff:
          type: integer
      required: [teamId, teamName, wins, losses]

    ScheduleGame:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        weekIndex:
          type: integer
        homeTeamId:
          type: integer
        awayTeamId:
          type: integer
        homeTeamName:
          type: string
        awayTeamName:
          type: string
        homeScore:
          type: integer
          nullable: true
        awayScore:
          type: integer
          nullable: true
        status:
          type: integer
      required: [id, seasonId, weekIndex, homeTeamId, awayTeamId, homeTeamName, awayTeamName, status]

    RosterPlayer:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        discordId:
          type: string
          nullable: true
        playerId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
        overall:
          type: integer
        devTrait:
          type: integer
        age:
          type: integer
          nullable: true
        jerseyNum:
          type: integer
          nullable: true
        contractYearsLeft:
          type: integer
          nullable: true
        archetypeAbbrev:
          type: string
          nullable: true
        portraitUrl:
          type: string
          nullable: true
      required: [id, seasonId, teamId, teamName, playerId, firstName, lastName, position, overall, devTrait]

    PlayerSeasonStats:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        playerId:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        discordId:
          type: string
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
        passYds:
          type: integer
        passTDs:
          type: integer
        passAtt:
          type: integer
        passComp:
          type: integer
        passInts:
          type: integer
        rushYds:
          type: integer
        rushTDs:
          type: integer
        rushAtt:
          type: integer
        recYds:
          type: integer
        recTDs:
          type: integer
        recRec:
          type: integer
        sacks:
          type: number
        defInts:
          type: integer
        totalTackles:
          type: integer
        defTDs:
          type: integer
        fgMade:
          type: integer
        fgAtt:
          type: integer
      required: [id, seasonId, playerId, teamId, teamName, firstName, lastName, position]

    DraftPick:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        discordId:
          type: string
          nullable: true
        draftYear:
          type: integer
        round:
          type: integer
        pickNum:
          type: integer
        originalTeamId:
          type: integer
          nullable: true
        originalTeamName:
          type: string
          nullable: true
      required: [id, seasonId, teamId, teamName, draftYear, round, pickNum]

    LeagueNewsItem:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        headline:
          type: string
        body:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        weekIndex:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, seasonId, headline, createdAt]

    UserRecord:
      type: object
      properties:
        id:
          type: integer
        discordId:
          type: string
        discordUsername:
          type: string
        team:
          type: string
          nullable: true
        seasonId:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        ties:
          type: integer
        pointDifferential:
          type: integer
        playoffWins:
          type: integer
        playoffLosses:
          type: integer
        superbowlWins:
          type: integer
        superbowlLosses:
          type: integer
      required: [id, discordId, discordUsername, seasonId, wins, losses, ties, pointDifferential]

    LeagueUserWithRecord:
      type: object
      properties:
        id:
          type: integer
        discordId:
          type: string
        discordUsername:
          type: string
        serverNickname:
          type: string
          nullable: true
        team:
          type: string
          nullable: true
        balance:
          type: integer
        eaId:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        allTimeSuperbowlWins:
          type: integer
        allTimeSuperbowlLosses:
          type: integer
        allTimeH2HWins:
          type: integer
        allTimeH2HLosses:
          type: integer
        playoffSeed:
          type: integer
          nullable: true
        playoffConference:
          type: string
          nullable: true
        currentSeasonRecord:
          $ref: "#/components/schemas/UserRecord"
          nullable: true
      required: [id, discordId, discordUsername, balance, isAdmin]

    LeagueUserDetail:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/LeagueUserWithRecord"
        currentSeasonRecord:
          $ref: "#/components/schemas/UserRecord"
          nullable: true
        inventory:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        globalRecord:
          $ref: "#/components/schemas/GlobalUserRecord"
          nullable: true
        savingsBalance:
          type: integer
      required: [user, inventory, savingsBalance]

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        discordId:
          type: string
        seasonId:
          type: integer
        purchaseId:
          type: integer
        itemType:
          type: string
        legendName:
          type: string
          nullable: true
        playerName:
          type: string
          nullable: true
        playerPosition:
          type: string
          nullable: true
        attributeName:
          type: string
          nullable: true
        legendCategory:
          type: string
        team:
          type: string
          nullable: true
      required: [id, discordId, seasonId, purchaseId, itemType, legendCategory]

    CoinTransaction:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        discordId:
          type: string
        amount:
          type: integer
        type:
          type: string
        description:
          type: string
        relatedUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, guildId, discordId, amount, type, description, createdAt]

    Wager:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        challengerId:
          type: string
        challengerUsername:
          type: string
        opponentId:
          type: string
        opponentUsername:
          type: string
        amount:
          type: integer
        pot:
          type: integer
        teamFor:
          type: string
        teamAgainst:
          type: string
        status:
          type: string
        winnerId:
          type: string
          nullable: true
        spread:
          type: integer
          nullable: true
        challengerSide:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, guildId, challengerId, challengerUsername, opponentId, opponentUsername, amount, pot, teamFor, teamAgainst, status, createdAt]

    StoreConfig:
      type: object
      properties:
        guildId:
          type: string
        payoutConfig:
          type: array
          items:
            $ref: "#/components/schemas/PayoutConfigEntry"
        seasonOverrides:
          type: object
          nullable: true
          properties:
            coreAttrCost:
              type: integer
              nullable: true
            coreAttrCap:
              type: integer
              nullable: true
            nonCoreAttrCost:
              type: integer
              nullable: true
            nonCoreAttrCap:
              type: integer
              nullable: true
            devUpsCost:
              type: integer
              nullable: true
            devUpsCap:
              type: integer
              nullable: true
            ageResetsCost:
              type: integer
              nullable: true
            ageResetsCap:
              type: integer
              nullable: true
            legendCost:
              type: integer
