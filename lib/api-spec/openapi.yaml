openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: league
    description: Franchise and league data (v1, Discord guild scoped)
  - name: economy
    description: Economy and coin data (per guild)
  - name: global
    description: Cross-guild global data
  - name: v2
    description: Madden-native league data (EA league ID scoped, no Discord)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/leagues:
    get:
      operationId: getLeagues
      tags: [global]
      summary: List all known guilds
      description: Returns a summary of every guild that has at least one season in the database
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Guild list
          content:
            application/json:
              schema:
                type: object
                properties:
                  leagues:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeagueSummary"
                required: [leagues]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/records:
    get:
      operationId: getGlobalRecords
      tags: [global]
      summary: Global all-time W/L leaderboard
      description: Returns cross-guild all-time records from global_user_records, sorted by wins
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Global leaderboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      $ref: "#/components/schemas/GlobalUserRecord"
                required: [leaderboard]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/users/{discordId}:
    get:
      operationId: getGlobalUser
      tags: [global]
      summary: Cross-guild profile for a Discord user
      description: Returns global W/L record, savings balance, and per-guild profiles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/discordId"
      responses:
        "200":
          description: Global user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalUserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}:
    get:
      operationId: getLeagueInfo
      tags: [league]
      summary: Active season info
      description: Returns the currently active season for a guild including id, week, season number, and config overrides
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Active season
          content:
            application/json:
              schema:
                type: object
                properties:
                  season:
                    $ref: "#/components/schemas/Season"
                required: [season]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/teams:
    get:
      operationId: getLeagueTeams
      tags: [league]
      summary: All franchise teams
      description: Returns all MCA teams for the active season including human/CPU status and Discord IDs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaTeam"
                required: [seasonId, seasonNumber, teams]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/standings:
    get:
      operationId: getLeagueStandings
      tags: [league]
      summary: Team standings and season stats
      description: Returns wins/losses and offensive/defensive stats from team_season_stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Standings
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  currentWeek:
                    type: string
                  standings:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamStanding"
                required: [seasonId, seasonNumber, currentWeek, standings]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/schedule:
    get:
      operationId: getLeagueSchedule
      tags: [league]
      summary: Full season schedule
      description: Returns all games for the active season. Filter by 0-based week index with ?week=N.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: week
          in: query
          required: false
          description: 0-based week index to filter by
          schema:
            type: integer
      responses:
        "200":
          description: Schedule games
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  currentWeek:
                    type: string
                  games:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScheduleGame"
                required: [seasonId, seasonNumber, currentWeek, games]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/rosters:
    get:
      operationId: getAllRosters
      tags: [league]
      summary: All team rosters (aggregate, cached)
      description: >
        Returns every player across all 32 teams in one response.
        Cache TTL is 10 minutes; invalidated immediately on any roster import.
        Response header X-Cache is HIT or MISS.
        Filter players by teamId client-side — do not call 32 per-team endpoints.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: All roster players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllRostersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/roster/{teamId}:
    get:
      operationId: getTeamRoster
      tags: [league]
      summary: Roster for a specific team
      description: Returns all players on a team with attributes, sorted by overall rating
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: teamId
          in: path
          required: true
          description: MCA team ID
          schema:
            type: integer
      responses:
        "200":
          description: Team roster
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  teamId:
                    type: integer
                  roster:
                    type: array
                    items:
                      $ref: "#/components/schemas/RosterPlayer"
                required: [seasonId, seasonNumber, teamId, roster]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/player-stats:
    get:
      operationId: getPlayerStats
      tags: [league]
      summary: Cumulative player season stats
      description: Returns season stats for all players. Filter by position with ?position=QB.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: position
          in: query
          required: false
          description: Filter by position abbreviation (e.g. QB, WR, RB)
          schema:
            type: string
      responses:
        "200":
          description: Player stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  stats:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlayerSeasonStats"
                required: [seasonId, seasonNumber, stats]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/draft-picks:
    get:
      operationId: getDraftPicks
      tags: [league]
      summary: Draft pick inventory
      description: Returns all draft picks held by each team for the next 3 draft classes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Draft picks
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  picks:
                    type: array
                    items:
                      $ref: "#/components/schemas/DraftPick"
                required: [seasonId, seasonNumber, picks]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/news:
    get:
      operationId: getLeagueNews
      tags: [league]
      summary: League news headlines
      description: Returns the latest EA CFM news items for the active season (most recent 25 by default)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: limit
          in: query
          required: false
          description: Maximum number of news items to return (default 25, max 200)
          schema:
            type: integer
            default: 25
            maximum: 200
      responses:
        "200":
          description: League news
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasonId:
                    type: integer
                  seasonNumber:
                    type: integer
                  news:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeagueNewsItem"
                required: [seasonId, seasonNumber, news]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/users:
    get:
      operationId: getLeagueUsers
      tags: [economy]
      summary: All users with balances and season records
      description: Returns all registered users for a guild including coin balance, season W/L/T/PD, and playoff seeds
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: League members
          content:
            application/json:
              schema:
                type: object
                properties:
                  guildId:
                    type: string
                  seasonId:
                    type: integer
                    nullable: true
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeagueUserWithRecord"
                required: [guildId, users]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/leagues/{guildId}/users/{discordId}:
    get:
      operationId: getLeagueUser
      tags: [economy]
      summary: Single user full profile
      description: Returns user record, current season W/L, inventory, global record, and savings balance
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - $ref: "#/components/parameters/discordId"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueUserDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leagues/{guildId}/users/{discordId}/transactions:
    get:
      operationId: getUserTransactions
      tags: [economy]
      summary: Last 50 transactions for a user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - $ref: "#/components/parameters/discordId"
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: object
                properties:
                  guildId:
                    type: string
                  discordId:
                    type: string
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/CoinTransaction"
                required: [guildId, discordId, transactions]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/leagues/{guildId}/wagers:
    get:
      operationId: getWagers
      tags: [economy]
      summary: Wagers for a guild
      description: Returns wagers. Filter by status (active/completed/pending/refused/cancelled).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, active, completed, refused, cancelled]
      responses:
        "200":
          description: Wagers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  guildId:
                    type: string
                  wagers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Wager"
                required: [guildId, wagers]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/leagues/{guildId}/store:
    get:
      operationId: getStore
      tags: [economy]
      summary: Current payout config and store prices
      description: Returns all payout config values (win/loss payouts, milestone tiers) and per-season store item cost overrides
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/guildId"
      responses:
        "200":
          description: Store and payout config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v2/leagues:
    get:
      operationId: listV2Leagues
      tags: [v2]
      summary: List all Madden-native leagues
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All registered EA leagues with active season info
          content:
            application/json:
              schema:
                type: object
                required: [leagues]
                properties:
                  leagues:
                    type: array
                    items:
                      $ref: "#/components/schemas/V2LeagueSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v2/leagues/{eaLeagueId}:
    get:
      operationId: getV2League
      tags: [v2]
      summary: Get active season info for a league
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
      responses:
        "200":
          description: League and active season info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V2LeagueInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/teams:
    get:
      operationId: getV2Teams
      tags: [v2]
      summary: All 32 teams for the active season
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, seasonNumber, teams]
                properties:
                  eaLeagueId:    { type: integer }
                  seasonId:      { type: integer }
                  seasonNumber:  { type: integer }
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2Team"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/rosters:
    get:
      operationId: getV2Rosters
      tags: [v2]
      summary: Full aggregate roster for the active season (cached 10 min)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
      responses:
        "200":
          description: All players across all teams
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, seasonNumber, currentWeek, playerCount, players]
                properties:
                  eaLeagueId:   { type: integer }
                  seasonId:     { type: integer }
                  seasonNumber: { type: integer }
                  currentWeek:  { type: string }
                  playerCount:  { type: integer }
                  importedAt:   { type: string, format: date-time, nullable: true }
                  players:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2RosterPlayer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/standings:
    get:
      operationId: getV2Standings
      tags: [v2]
      summary: Team standings for the active season
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
      responses:
        "200":
          description: Standings ordered by wins desc, ptsFor desc
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, seasonNumber, currentWeek, standings]
                properties:
                  eaLeagueId:   { type: integer }
                  seasonId:     { type: integer }
                  seasonNumber: { type: integer }
                  currentWeek:  { type: string }
                  standings:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2TeamStat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/schedule:
    get:
      operationId: getV2Schedule
      tags: [v2]
      summary: Game schedule for the active season
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
        - name: week
          in: query
          required: false
          description: Filter by weekIndex (0-based)
          schema: { type: integer }
      responses:
        "200":
          description: Schedule games, optionally filtered by week
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, seasonNumber, currentWeek, games]
                properties:
                  eaLeagueId:   { type: integer }
                  seasonId:     { type: integer }
                  seasonNumber: { type: integer }
                  currentWeek:  { type: string }
                  games:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2ScheduleGame"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/player-stats:
    get:
      operationId: getV2PlayerStats
      tags: [v2]
      summary: Cumulative player season stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
        - name: position
          in: query
          required: false
          description: Filter by position (e.g. QB, WR, CB)
          schema: { type: string }
      responses:
        "200":
          description: Player stats for the active season
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, seasonNumber, stats]
                properties:
                  eaLeagueId:   { type: integer }
                  seasonId:     { type: integer }
                  seasonNumber: { type: integer }
                  stats:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2PlayerStat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/draft-picks:
    get:
      operationId: getV2DraftPicks
      tags: [v2]
      summary: Current draft pick ownership for the active season
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
      responses:
        "200":
          description: Draft picks ordered by year, round, pick number
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, seasonNumber, picks]
                properties:
                  eaLeagueId:   { type: integer }
                  seasonId:     { type: integer }
                  seasonNumber: { type: integer }
                  picks:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2DraftPick"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/roster/{teamId}:
    get:
      operationId: getV2TeamRoster
      tags: [v2]
      summary: Roster for a single team in the active season
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: All players on the team
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, seasonNumber, teamId, playerCount, players]
                properties:
                  eaLeagueId:   { type: integer }
                  seasonId:     { type: integer }
                  seasonNumber: { type: integer }
                  teamId:       { type: integer }
                  playerCount:  { type: integer }
                  players:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2RosterPlayer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/team-stats:
    get:
      operationId: getV2TeamStats
      tags: [v2]
      summary: Cumulative team stats for the active season
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
      responses:
        "200":
          description: Team stats ordered by offensive yards desc
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, seasonNumber, teamStats]
                properties:
                  eaLeagueId:   { type: integer }
                  seasonId:     { type: integer }
                  seasonNumber: { type: integer }
                  teamStats:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2TeamStat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/team-stats/week/{weekType}/{weekNum}:
    get:
      operationId: getV2TeamWeekStats
      tags: [v2]
      summary: Per-week team stats (raw game data)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
        - $ref: "#/components/parameters/weekType"
        - $ref: "#/components/parameters/weekNum"
      responses:
        "200":
          description: Team stats for the given week
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, weekType, weekNum, teamStats]
                properties:
                  eaLeagueId: { type: integer }
                  seasonId:   { type: integer }
                  weekType:   { type: string }
                  weekNum:    { type: integer }
                  teamStats:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2TeamWeekStat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/team-stats/week/{weekIndex}:
    get:
      operationId: getV2TeamWeekStatsByIndex
      tags: [v2]
      summary: Per-week team stats by week number (all week types)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
        - name: weekIndex
          in: path
          required: true
          description: Week number (1-based)
          schema: { type: integer }
      responses:
        "200":
          description: Team stats for the given week number across all week types
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, weekNum, teamStats]
                properties:
                  eaLeagueId: { type: integer }
                  seasonId:   { type: integer }
                  weekNum:    { type: integer }
                  teamStats:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2TeamWeekStat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/player-stats/week/{weekType}/{weekNum}:
    get:
      operationId: getV2PlayerWeekStats
      tags: [v2]
      summary: Per-week player stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
        - $ref: "#/components/parameters/weekType"
        - $ref: "#/components/parameters/weekNum"
        - name: statType
          in: query
          required: false
          description: Filter by stat type (passing, rushing, receiving, defense, kicking, punting, kickreturn, puntreturn)
          schema: { type: string }
      responses:
        "200":
          description: Player stats for the given week, optionally filtered by stat type
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, weekType, weekNum, stats]
                properties:
                  eaLeagueId: { type: integer }
                  seasonId:   { type: integer }
                  weekType:   { type: string }
                  weekNum:    { type: integer }
                  stats:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2PlayerWeekStat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/leagues/{eaLeagueId}/player-stats/week/{weekIndex}:
    get:
      operationId: getV2PlayerWeekStatsByIndex
      tags: [v2]
      summary: Per-week player stats by week number (all week types)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/eaLeagueId"
        - name: weekIndex
          in: path
          required: true
          description: Week number (1-based)
          schema: { type: integer }
        - name: statType
          in: query
          required: false
          description: Filter by stat type (passing, rushing, receiving, defense, kicking, punting, kickreturn, puntreturn)
          schema: { type: string }
      responses:
        "200":
          description: Player stats for the given week number, optionally filtered by stat type
          content:
            application/json:
              schema:
                type: object
                required: [eaLeagueId, seasonId, weekNum, stats]
                properties:
                  eaLeagueId: { type: integer }
                  seasonId:   { type: integer }
                  weekNum:    { type: integer }
                  stats:
                    type: array
                    items:
                      $ref: "#/components/schemas/McaV2PlayerWeekStat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/users:
    post:
      operationId: registerV2User
      tags: [v2]
      summary: Register or update a mobile app user by gamertag
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gamertag]
              properties:
                gamertag:    { type: string, description: "Lowercase gamertag (canonical identifier)" }
                displayName: { type: string }
                platform:    { type: string, enum: [ps5, xbs, pc, ""] }
                email:       { type: string, format: email }
      responses:
        "200":
          description: User registered or updated
          content:
            application/json:
              schema:
                type: object
                required: [ok, message]
                properties:
                  ok:      { type: boolean }
                  message: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v2/users/{gamertag}:
    get:
      operationId: getV2User
      tags: [v2]
      summary: Get app user profile and linked leagues
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/gamertag"
      responses:
        "200":
          description: User profile with linked league and team info
          content:
            application/json:
              schema:
                type: object
                required: [gamertag, displayName, platform, leagues]
                properties:
                  id:          { type: string, format: uuid }
                  gamertag:    { type: string }
                  displayName: { type: string }
                  platform:    { type: string }
                  email:       { type: string, nullable: true }
                  createdAt:   { type: string, format: date-time }
                  leagues:
                    type: array
                    items: { $ref: "#/components/schemas/V2UserLeague" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/users/{gamertag}/leagues:
    get:
      operationId: getV2UserLeagues
      tags: [v2]
      summary: Leagues linked to a gamertag with team details
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/gamertag"
      responses:
        "200":
          description: Linked leagues with team and standings info
          content:
            application/json:
              schema:
                type: object
                required: [gamertag, leagues]
                properties:
                  gamertag: { type: string }
                  leagues:
                    type: array
                    items: { $ref: "#/components/schemas/V2UserLeague" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    guildId:
      name: guildId
      in: path
      required: true
      description: Discord guild (server) ID
      schema:
        type: string
    discordId:
      name: discordId
      in: path
      required: true
      description: Discord user ID
      schema:
        type: string
    limit:
      name: limit
      in: query
      required: false
      description: Maximum number of results to return (max 200)
      schema:
        type: integer
        default: 50
        maximum: 200
    eaLeagueId:
      name: eaLeagueId
      in: path
      required: true
      description: EA / Madden league ID (no Discord involvement)
      schema:
        type: integer
    teamId:
      name: teamId
      in: path
      required: true
      description: Madden team ID within the league
      schema:
        type: integer
    weekType:
      name: weekType
      in: path
      required: true
      description: Week type — pre (preseason), reg (regular), post (playoffs)
      schema:
        type: string
        enum: [pre, reg, post]
    weekNum:
      name: weekNum
      in: path
      required: true
      description: Week number (1-based)
      schema:
        type: integer
        minimum: 1
    gamertag:
      name: gamertag
      in: path
      required: true
      description: Lowercase gamertag (canonical app user identifier)
      schema:
        type: string

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    V2LeagueSummary:
      type: object
      required: [eaLeagueId, leagueName, platform, updatedAt]
      properties:
        eaLeagueId:   { type: integer }
        leagueName:   { type: string }
        platform:     { type: string }
        updatedAt:    { type: string, format: date-time }
        seasonId:     { type: integer, nullable: true }
        seasonNumber: { type: integer, nullable: true }
        currentWeek:  { type: string, nullable: true }

    V2LeagueInfo:
      type: object
      required: [eaLeagueId, leagueName, platform, seasonId, seasonNumber, currentWeek, isActive, startedAt]
      properties:
        eaLeagueId:   { type: integer }
        leagueName:   { type: string }
        platform:     { type: string }
        seasonId:     { type: integer }
        seasonNumber: { type: integer }
        currentWeek:  { type: string }
        isActive:     { type: boolean }
        startedAt:    { type: string, format: date-time }

    V2UserLeague:
      type: object
      required: [eaLeagueId, leagueName, platform]
      properties:
        eaLeagueId:   { type: integer }
        leagueName:   { type: string }
        platform:     { type: string }
        teamId:       { type: integer, nullable: true }
        teamName:     { type: string, nullable: true }
        conference:   { type: string, nullable: true }
        divName:      { type: string, nullable: true }
        ovrRating:    { type: integer, nullable: true }
        wins:         { type: integer, nullable: true }
        losses:       { type: integer, nullable: true }
        ties:         { type: integer, nullable: true }
        ptsFor:       { type: integer, nullable: true }
        ptsAgainst:   { type: integer, nullable: true }
        linkedAt:     { type: string, format: date-time }

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Season:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        seasonNumber:
          type: integer
        isActive:
          type: boolean
        currentWeek:
          type: string
        catchupMode:
          type: boolean
        startedAt:
          type: string
          format: date-time
        coreAttrCostOverride:
          type: integer
          nullable: true
        coreAttrCapOverride:
          type: integer
          nullable: true
        legendCostOverride:
          type: integer
          nullable: true
      required: [id, guildId, seasonNumber, isActive, currentWeek, catchupMode, startedAt]

    McaTeam:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        teamId:
          type: integer
        fullName:
          type: string
        nickName:
          type: string
        conference:
          type: string
          nullable: true
        userName:
          type: string
        isHuman:
          type: boolean
        discordId:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
      required: [id, seasonId, teamId, fullName, nickName, userName, isHuman]

    TeamStanding:
      type: object
      properties:
        teamId:
          type: integer
        teamName:
          type: string
        discordId:
          type: string
          nullable: true
        wins:
          type: integer
        losses:
          type: integer
        offYds:
          type: integer
        offPassYds:
          type: integer
        offRushYds:
          type: integer
        offTDs:
          type: integer
        offPtsPerGame:
          type: number
        defPassYds:
          type: integer
        defRushYds:
          type: integer
        defTDs:
          type: integer
        teamSacks:
          type: integer
        teamInts:
          type: integer
        offRedZonePct:
          type: number
        defRedZonePct:
          type: number
        turnoverDiff:
          type: integer
      required: [teamId, teamName, wins, losses]

    ScheduleGame:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        weekIndex:
          type: integer
        homeTeamId:
          type: integer
        awayTeamId:
          type: integer
        homeTeamName:
          type: string
        awayTeamName:
          type: string
        homeScore:
          type: integer
          nullable: true
        awayScore:
          type: integer
          nullable: true
        status:
          type: integer
      required: [id, seasonId, weekIndex, homeTeamId, awayTeamId, homeTeamName, awayTeamName, status]

    RosterPlayer:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        discordId:
          type: string
          nullable: true
        playerId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
        overall:
          type: integer
        devTrait:
          type: integer
          description: "0=Normal 1=Impact 2=Star 3=Superstar 4=X-Factor"
        age:
          type: integer
          nullable: true
        jerseyNum:
          type: integer
          nullable: true
        contractYearsLeft:
          type: integer
          nullable: true
          description: "null=unknown; 1=final/contract year"
        archetypeAbbrev:
          type: string
          nullable: true
          description: "EA archetype e.g. FIELD_GENERAL, SPEED_BACK"
        xpTotal:
          type: integer
          nullable: true
          description: "Accumulated EA experiencePoints"
        attributes:
          type: object
          nullable: true
          description: "All *Rating fields from MCA export (speed, strength, throw power, etc.)"
          additionalProperties:
            type: number
        abilities:
          type: object
          nullable: true
          description: "Superstar/X-Factor ability names: { zone?: string, superstar?: string[] }"
        portraitUrl:
          type: string
          nullable: true
        importedAt:
          type: string
          format: date-time
      required: [id, seasonId, teamId, teamName, playerId, firstName, lastName, position, overall, devTrait, importedAt]

    AllRostersResponse:
      type: object
      description: "All 32-team roster in one payload. Filter by teamId client-side."
      properties:
        seasonId:
          type: integer
        seasonNumber:
          type: integer
        currentWeek:
          type: string
        playerCount:
          type: integer
          description: "Total number of players across all teams"
        importedAt:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp of the most recent roster import"
        players:
          type: array
          items:
            $ref: "#/components/schemas/RosterPlayer"
      required: [seasonId, seasonNumber, currentWeek, playerCount, players]

    PlayerSeasonStats:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        playerId:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        discordId:
          type: string
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
        passYds:
          type: integer
        passTDs:
          type: integer
        passAtt:
          type: integer
        passComp:
          type: integer
        passInts:
          type: integer
        rushYds:
          type: integer
        rushTDs:
          type: integer
        rushAtt:
          type: integer
        recYds:
          type: integer
        recTDs:
          type: integer
        recRec:
          type: integer
        sacks:
          type: number
        defInts:
          type: integer
        totalTackles:
          type: integer
        defTDs:
          type: integer
        fgMade:
          type: integer
        fgAtt:
          type: integer
      required: [id, seasonId, playerId, teamId, teamName, firstName, lastName, position]

    DraftPick:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        discordId:
          type: string
          nullable: true
        draftYear:
          type: integer
        round:
          type: integer
        pickNum:
          type: integer
        originalTeamId:
          type: integer
          nullable: true
        originalTeamName:
          type: string
          nullable: true
      required: [id, seasonId, teamId, teamName, draftYear, round, pickNum]

    LeagueNewsItem:
      type: object
      properties:
        id:
          type: integer
        seasonId:
          type: integer
        headline:
          type: string
        body:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        weekIndex:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, seasonId, headline, createdAt]

    UserRecord:
      type: object
      properties:
        id:
          type: integer
        discordId:
          type: string
        discordUsername:
          type: string
        team:
          type: string
          nullable: true
        seasonId:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        ties:
          type: integer
        pointDifferential:
          type: integer
        playoffWins:
          type: integer
        playoffLosses:
          type: integer
        superbowlWins:
          type: integer
        superbowlLosses:
          type: integer
      required: [id, discordId, discordUsername, seasonId, wins, losses, ties, pointDifferential]

    LeagueUserWithRecord:
      type: object
      properties:
        id:
          type: integer
        discordId:
          type: string
        discordUsername:
          type: string
        serverNickname:
          type: string
          nullable: true
        mcaUserName:
          type: string
          nullable: true
          description: In-game Madden username from the MCA import (matches franchiseMcaTeams.userName)
        team:
          type: string
          nullable: true
        balance:
          type: integer
        eaId:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        allTimeSuperbowlWins:
          type: integer
        allTimeSuperbowlLosses:
          type: integer
        allTimeH2HWins:
          type: integer
        allTimeH2HLosses:
          type: integer
        playoffSeed:
          type: integer
          nullable: true
        playoffConference:
          type: string
          nullable: true
        currentSeasonRecord:
          $ref: "#/components/schemas/UserRecord"
          nullable: true
      required: [id, discordId, discordUsername, balance, isAdmin]

    LeagueUserDetail:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/LeagueUserWithRecord"
        currentSeasonRecord:
          $ref: "#/components/schemas/UserRecord"
          nullable: true
        inventory:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        globalRecord:
          $ref: "#/components/schemas/GlobalUserRecord"
          nullable: true
        savingsBalance:
          type: integer
      required: [user, inventory, savingsBalance]

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        discordId:
          type: string
        seasonId:
          type: integer
        purchaseId:
          type: integer
        itemType:
          type: string
        legendName:
          type: string
          nullable: true
        playerName:
          type: string
          nullable: true
        playerPosition:
          type: string
          nullable: true
        attributeName:
          type: string
          nullable: true
        legendCategory:
          type: string
        team:
          type: string
          nullable: true
      required: [id, discordId, seasonId, purchaseId, itemType, legendCategory]

    CoinTransaction:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        discordId:
          type: string
        amount:
          type: integer
        type:
          type: string
        description:
          type: string
        relatedUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, guildId, discordId, amount, type, description, createdAt]

    Wager:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        challengerId:
          type: string
        challengerUsername:
          type: string
        opponentId:
          type: string
        opponentUsername:
          type: string
        amount:
          type: integer
        pot:
          type: integer
        teamFor:
          type: string
        teamAgainst:
          type: string
        status:
          type: string
        winnerId:
          type: string
          nullable: true
        spread:
          type: integer
          nullable: true
        challengerSide:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, guildId, challengerId, challengerUsername, opponentId, opponentUsername, amount, pot, teamFor, teamAgainst, status, createdAt]

    StoreConfig:
      type: object
      properties:
        guildId:
          type: string
        payoutConfig:
          type: array
          items:
            $ref: "#/components/schemas/PayoutConfigEntry"
        seasonOverrides:
          type: object
          nullable: true
          properties:
            coreAttrCost:
              type: integer
              nullable: true
            coreAttrCap:
              type: integer
              nullable: true
            nonCoreAttrCost:
              type: integer
              nullable: true
            nonCoreAttrCap:
              type: integer
              nullable: true
            devUpsCost:
              type: integer
              nullable: true
            devUpsCap:
              type: integer
              nullable: true
            ageResetsCost:
              type: integer
              nullable: true
            ageResetsCap:
              type: integer
              nullable: true
            legendCost:
              type: integer
              nullable: true
            legendsPerSeasonCap:
              type: integer
              nullable: true
            customGoldCost:
              type: integer
              nullable: true
            customSilverCost:
              type: integer
              nullable: true
            customBronzeCost:
              type: integer
              nullable: true
            contractExtensionCost:
              type: integer
              nullable: true
            contractExtensionCap:
              type: integer
              nullable: true
            salaryReductionCost:
              type: integer
              nullable: true
            salaryReductionCap:
              type: integer
              nullable: true
            bonusReductionCost:
              type: integer
              nullable: true
            bonusReductionCap:
              type: integer
              nullable: true
      required: [guildId, payoutConfig]

    PayoutConfigEntry:
      type: object
      properties:
        key:
          type: string
        value:
          type: integer
        description:
          type: string
      required: [key, value, description]

    GlobalUserRecord:
      type: object
      properties:
        discordId:
          type: string
        discordUsername:
          type: string
          nullable: true
          description: Display name from the users table (present on leaderboard, null on profile)
        serverNickname:
          type: string
          nullable: true
        team:
          type: string
          nullable: true
        wins:
          type: integer
        losses:
          type: integer
        ties:
          type: integer
        pointDifferential:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required: [discordId, wins, losses, ties, pointDifferential, updatedAt]

    GlobalUserProfile:
      type: object
      properties:
        discordId:
          type: string
        globalRecord:
          $ref: "#/components/schemas/GlobalUserRecord"
          nullable: true
        savingsBalance:
          type: integer
        guildProfiles:
          type: array
          items:
            $ref: "#/components/schemas/GuildProfile"
        eaIds:
          type: array
          items:
            $ref: "#/components/schemas/EaId"
      required: [discordId, savingsBalance, guildProfiles, eaIds]

    GuildProfile:
      type: object
      properties:
        guildId:
          type: string
        discordUsername:
          type: string
        serverNickname:
          type: string
          nullable: true
        team:
          type: string
          nullable: true
        balance:
          type: integer
        isAdmin:
          type: boolean
        eaId:
          type: string
          nullable: true
        allTimeH2HWins:
          type: integer
        allTimeH2HLosses:
          type: integer
        allTimeSuperbowlWins:
          type: integer
        allTimeSuperbowlLosses:
          type: integer
      required: [guildId, discordUsername, balance, isAdmin]

    EaId:
      type: object
      properties:
        eaId:
          type: string
        console:
          type: string
        slot:
          type: integer
      required: [eaId, console, slot]

    McaV2Team:
      type: object
      required: [id, eaSeasonId, eaLeagueId, teamId, fullName, nickName, userName, isHuman, updatedAt]
      properties:
        id:             { type: integer }
        eaSeasonId:     { type: integer }
        eaLeagueId:     { type: integer }
        teamId:         { type: integer }
        fullName:       { type: string }
        nickName:       { type: string }
        abbrName:       { type: string, nullable: true }
        conference:     { type: string, nullable: true }
        divName:        { type: string, nullable: true }
        userName:       { type: string }
        isHuman:        { type: boolean }
        offScheme:      { type: string, nullable: true }
        defScheme:      { type: string, nullable: true }
        ovrRating:      { type: integer, nullable: true }
        primaryColor:   { type: integer, nullable: true }
        secondaryColor: { type: integer, nullable: true }
        logoId:         { type: integer, nullable: true }
        updatedAt:      { type: string, format: date-time }
        linkedGamertag:    { type: string, nullable: true }
        linkedDisplayName: { type: string, nullable: true }

